name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in semver form, without a leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release version
        run: |
          version="${{ inputs.version }}"

          case "$version" in
            v*)
              echo "Version input must not start with 'v'. Use values like 1.2.3, not v1.2.3." >&2
              exit 1
              ;;
          esac

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if ! [[ "$version" =~ $semver_re ]]; then
            echo "Version input must be a semantic version like 1.2.3 or 1.2.3-rc.1." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require main branch
        run: |
          test "${GITHUB_REF_NAME}" = "main"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install latest GitHub CLI
        run: |
          type -p curl >/dev/null || sudo apt-get update
          type -p curl >/dev/null || sudo apt-get install -y curl
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Verify release version manifests
        run: |
          python3 scripts/release_versions.py "${{ inputs.version }}" --check

      - name: Publish skills release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --tag "v${{ inputs.version }}"
